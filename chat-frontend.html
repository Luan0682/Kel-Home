<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kel</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; font-family:-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif; background:#1a1815; color:#e8e4dc; }
.app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* ── header ── */
.header { padding:16px 20px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; gap:12px; flex-shrink:0; }
.header .name { font-size:17px; font-weight:600; color:#e8e4dc; }
.header .status { font-size:12px; color:#7a756b; }
.dot { width:8px; height:8px; border-radius:50%; }
.dot.online  { background:#5cb85c; }
.dot.offline { background:#7a756b; }

/* ── messages ── */
.messages { flex:1; overflow-y:auto; padding:16px 16px 8px; display:flex; flex-direction:column; gap:10px; -webkit-overflow-scrolling:touch; }
.msg { max-width:78%; padding:10px 14px; border-radius:18px; font-size:15px; line-height:1.5; word-break:break-word; animation:fadeUp .2s ease; }
.msg.user { align-self:flex-end; background:#68544b; color:#fff; border-bottom-right-radius:4px; }
.msg.kel  { align-self:flex-start; background:#2a2620; color:#e8e4dc; border-bottom-left-radius:4px; }
.msg .time { font-size:11px; color:rgba(255,255,255,.35); margin-top:4px; }
.empty-state { flex:1; display:flex; align-items:center; justify-content:center; color:#7a756b; font-size:14px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ── composer ── */
.composer {
  flex-shrink:0;
  border-top:1px solid rgba(255,255,255,.06);
  background:#1a1815;
  padding:8px 12px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
}
.composer-box {
  background:#2a2620;
  border-radius:18px;
  display:flex;
  flex-direction:column;
}
.composer-textarea {
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  resize:none;
  color:#e8e4dc;
  font-size:15px;
  font-family:inherit;
  line-height:1.5;
  padding:12px 14px 6px;
  /* 1行高 + 最多50vh */
  min-height:44px;
  max-height:50vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.composer-textarea::placeholder { color:#7a756b; }
.composer-toolbar {
  display:flex;
  align-items:center;
  padding:4px 8px 8px;
  gap:4px;
}
/* model picker */
.model-select {
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:#7a756b;
  font-size:12px;
  font-family:inherit;
  cursor:pointer;
  padding:4px 2px;
  /* hide default arrow on iOS */
  -webkit-appearance:none;
  appearance:none;
}
.model-select option { background:#2a2620; color:#e8e4dc; }
/* attach btn */
.attach-btn {
  width:32px; height:32px;
  border-radius:50%;
  border:none;
  background:transparent;
  color:#7a756b;
  font-size:18px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.attach-btn:active { background:rgba(255,255,255,.06); }
/* send btn */
.send-btn {
  width:32px; height:32px;
  border-radius:50%;
  border:none;
  background:#68544b;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition:opacity .15s;
}
.send-btn:disabled { opacity:.3; cursor:default; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="dot offline" id="statusDot"></div>
    <div>
      <div class="name">Kel</div>
      <div class="status" id="statusText">离线</div>
    </div>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="composer">
    <div class="composer-box">
      <textarea class="composer-textarea" id="input" rows="1" placeholder="说点什么..."></textarea>
      <div class="composer-toolbar">
        <select class="model-select" id="modelSelect">
          <option value="claude-sonnet-4-20250514">Sonnet 4</option>
          <option value="claude-opus-4-5">Opus 4.5</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
        <!-- attach: hidden file input + visible button -->
        <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.md,.doc,.docx" style="display:none">
        <button class="attach-btn" id="attachBtn" title="上传文件">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>
<script>
const API = location.origin;
const POLL_INTERVAL = 3000;
let lastReplyTs = localStorage.getItem('kel_lastReplyTs') || '';
let chatHistory = JSON.parse(localStorage.getItem('kel_chatHistory') || '[]');

const msgsEl    = document.getElementById('msgs');
const inputEl   = document.getElementById('input');
const sendBtn   = document.getElementById('sendBtn');
const attachBtn = document.getElementById('attachBtn');
const fileInput = document.getElementById('fileInput');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

/* ── helpers ── */
function formatTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function renderMessages() {
  msgsEl.innerHTML = '';
  if (!chatHistory.length) {
    msgsEl.innerHTML = '<div class="empty-state">还没有消息</div>';
    return;
  }
  for (const m of chatHistory) {
    const div = document.createElement('div');
    div.className = 'msg ' + m.role;
    div.innerHTML = m.content.replace(/\n/g, '<br>') + '<div class="time">' + formatTime(m.ts) + '</div>';
    msgsEl.appendChild(div);
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function saveHistory() {
  localStorage.setItem('kel_chatHistory', JSON.stringify(chatHistory));
  localStorage.setItem('kel_lastReplyTs', lastReplyTs);
}

/* ── send ── */
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = '';   /* reset to CSS min-height */
  sendBtn.disabled = true;
  inputEl.focus();

  const ts = new Date().toISOString();
  chatHistory.push({ role: 'user', content: text, ts });
  saveHistory();
  renderMessages();

  try {
    await fetch(API + '/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text, ts })
    });
  } catch(e) { console.error(e); }
}

/* ── poll / status ── */
async function pollReplies() {
  try {
    const res = await fetch(API + '/api/replies?since=' + encodeURIComponent(lastReplyTs));
    const data = await res.json();
    if (data.messages && data.messages.length) {
      for (const m of data.messages) {
        if (!chatHistory.find(h => h.id === m.id)) {
          chatHistory.push({ role: 'kel', content: m.content, ts: m.ts, id: m.id });
          lastReplyTs = m.ts;
        }
      }
      saveHistory();
      renderMessages();
    }
  } catch(e) {}
}

async function checkStatus() {
  try {
    const res = await fetch(API + '/api/status', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    if (data.ok) {
      statusDot.className = 'dot online';
      statusText.textContent = '中转在线';
    }
  } catch(e) {
    statusDot.className = 'dot offline';
    statusText.textContent = '离线';
  }
}

/* ── textarea auto-grow (only on input, nothing else) ── */
inputEl.addEventListener('input', () => {
  inputEl.style.height = '';
  inputEl.style.height = inputEl.scrollHeight + 'px';
  sendBtn.disabled = !inputEl.value.trim();
});

/* ── send button ── */
sendBtn.addEventListener('click', sendMessage);

/* ── attach (UI placeholder) ── */
attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  /* TODO: handle file upload */
  const f = fileInput.files[0];
  if (f) console.log('file selected:', f.name);
  fileInput.value = '';
});

/* ── init ── */
renderMessages();
checkStatus();
setInterval(pollReplies, POLL_INTERVAL);
setInterval(checkStatus, 15000);
pollReplies();
</script>
</body>
</html>
