<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F3EE">
<title>Kel</title>
<style>
:root {
  --bg-main: #F5F3EE;
  --bg-card: #FFF;
  --bg-input: #FBFAF7;
  --border-input: #E7E3DA;
  --text-primary: #1A1815;
  --text-secondary: #68544B;
  --text-muted: #9A958B;
  --text-faint: #B8B3A8;
  --bubble-user: #68544B;
  --bubble-user-text: #DFF2EC;
  --bubble-ai: #DFF2EC;
  --bubble-ai-text: #68544B;
  --accent: #1A1815;
  --msg-font-size: 15px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif; background: var(--bg-main); color: var(--text-primary); -webkit-font-smoothing: antialiased; }

.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* Header */
.header {
  flex: none;
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-title { font-family: 'Newsreader', 'Noto Serif SC', serif; font-size: 24px; font-weight: 400; color: var(--text-primary); }
.status-badge { display: flex; align-items: center; gap: 6px; background: var(--bg-card); border-radius: 16px; padding: 6px 12px; box-shadow: 0 0 0 1px rgba(43,38,30,.05), 0 2px 6px rgba(43,38,30,.05); font-size: 12px; color: var(--text-muted); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
.status-dot.online { background: #5cb85c; }

/* Messages area */
.messages-container { flex: 1; min-height: 0; position: relative; }
.messages {
  position: absolute; inset: 0;
  overflow-y: auto;
  padding: 10px 20px 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.messages::-webkit-scrollbar { display: none; }

/* Message wrap */
.msg-wrap { margin-bottom: 12px; display: flex; flex-direction: column; animation: fadeUp .3s ease both; }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.ai { align-items: flex-start; }

/* Avatar + name + timestamp row */
.msg-meta { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 3px; }
.msg-wrap.user .msg-meta { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex: none; }
.msg-info { display: flex; flex-direction: column; gap: 1px; }
.msg-wrap.user .msg-info { align-items: flex-end; }
.msg-name { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
.msg-time { font-size: 10px; color: var(--text-faint); }

/* Thinking button */
.think-btn {
  border: none; background: transparent; padding: 0; margin-bottom: 2px; cursor: pointer;
  display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted);
}
.think-btn:hover { color: var(--text-secondary); }
.think-icon { width: 14px; height: 14px; opacity: .6; }

/* Bubble */
.msg-bubble {
  max-width: 88%;
  padding: 10px 14px;
  font-size: var(--msg-font-size);
  line-height: 1.55;
  letter-spacing: -0.008em;
  word-break: break-word;
  white-space: pre-wrap;
}
.msg-bubble-row {
  display: flex;
  align-items: flex-end;
  gap: 6px;
}
.msg-wrap.user .msg-bubble-row { justify-content: flex-end; }
.msg-wrap.ai .msg-bubble-row .msg-time { order: 2; }
.msg-bubble-row .msg-time { font-size: 10px; color: var(--text-faint); white-space: nowrap; flex: none; margin-bottom: 2px; }
.msg-wrap.user .msg-bubble {
  background: var(--bubble-user);
  color: var(--bubble-user-text);
  border-radius: 20px 20px 4px 20px;
}
.msg-wrap.ai .msg-bubble {
  background: var(--bubble-ai);
  color: var(--bubble-ai-text);
  border-radius: 20px 20px 20px 4px;
}

/* Thinking modal */
.think-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .2s ease;
}
.think-modal {
  background: var(--bg-main); border-radius: 16px; max-width: 500px; width: 100%;
  max-height: 70vh; overflow-y: auto; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.think-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.think-modal-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.think-modal-close { border: none; background: transparent; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 4px; }
.think-modal-body { font-size: 13px; line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap; }

/* Typing dots */
.typing-dots { display: flex; gap: 4px; padding: 6px 0; }
.typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-faint); animation: dots 1.4s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }

/* Work log styles — full width, collapsible */
.msg-wrap.ai.worklog-wrap {
  align-items: center;
  padding: 0 4px;
}
.msg-wrap.ai.worklog-wrap .msg-meta { display: none; }
.worklog-card {
  border: 1px solid #2a2620;
  border-radius: 12px;
  overflow: hidden;
  background: #1a1815;
  color: #e8e4dc;
  width: 95%;
}
.worklog-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
}
.worklog-header:active { background: #222; }
.worklog-arrow {
  width: 12px; height: 12px;
  transition: transform .2s;
  color: #888;
}
.worklog-card.open .worklog-arrow { transform: rotate(90deg); }
.worklog-action {
  font-size: 11px;
  letter-spacing: .3px;
  color: #7c9;
}
.worklog-action.command { color: #fc6; }
.worklog-action.code { color: #6cf; }
.worklog-action.file { color: #c9f; }
.worklog-action.thinking { color: #f96; }
.worklog-summary {
  font-size: 13px;
  color: #ccc;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.worklog-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
  padding: 0 14px;
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
}
.worklog-card.open .worklog-body { max-height: 600px; padding: 0 14px 12px; }
.worklog-body-text {
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  color: #ddd;
}
.worklog-code {
  background: #111;
  border-radius: 6px;
  padding: 10px 12px;
  margin-top: 8px;
  overflow-x: auto;
  font-size: 12px;
  line-height: 1.5;
  white-space: pre;
  color: #ccc;
}

/* Input area */
.input-area {
  flex: none;
  padding: 6px 14px calc(env(safe-area-inset-bottom, 0px) + 10px);
}
.input-box {
  background: var(--bg-input);
  border: 1px solid var(--border-input);
  border-radius: 24px;
  padding: 12px 16px 8px;
  box-shadow: 0 -2px 12px rgba(43,38,30,.06), 0 1px 4px rgba(43,38,30,.04);
}
.input-box textarea {
  display: block; width: 100%; min-height: 28px; max-height: 40vh;
  border: none; background: transparent; resize: none; outline: none;
  font-family: inherit; font-size: 15px; line-height: 1.6; color: #2B2620;
  padding: 2px 4px 6px; font-weight: 300; overflow-y: auto;
}
.input-box textarea::placeholder { color: var(--text-muted); }
.input-actions { display: flex; align-items: center; justify-content: flex-end; padding-top: 4px; }
.send-btn {
  width: 36px; height: 36px; border-radius: 50%; background: var(--accent);
  border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: opacity .15s;
}
.send-btn:disabled { opacity: 0; pointer-events: none; }
.send-btn svg { width: 16px; height: 16px; }

/* Date separator */
.date-sep { text-align: center; padding: 16px 0 8px; font-size: 11px; color: var(--text-faint); }

/* Empty state */
.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; padding: 40px; text-align: center; }

/* Chat list */
.chat-list { position: absolute; inset: 0; background: var(--bg-main); z-index: 100; display: flex; flex-direction: column; overflow-y: auto; padding: 16px; }
.chat-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background .15s; }
.chat-item:hover { background: rgba(104,84,75,.04); }
.chat-item.active { background: var(--bg-card); box-shadow: 0 1px 4px rgba(43,38,30,.06); }
.chat-item-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.chat-item-preview { font-size: 12px; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.chat-item-count { font-size: 11px; color: var(--text-faint); margin-left: auto; }

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes dots { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

/* Hide in specific states */
.hidden { display: none !important; }

/* Settings button */
.settings-btn { border: none; background: transparent; padding: 6px; cursor: pointer; color: var(--text-muted); border-radius: 8px; }
.settings-btn:hover { background: rgba(0,0,0,.05); color: var(--text-primary); }

/* Settings panel */
.settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; animation: fadeIn .2s; }
.settings-panel { position: absolute; right: 0; top: 0; bottom: 0; width: min(320px, 85vw); background: var(--bg-main); box-shadow: -4px 0 20px rgba(0,0,0,.15); overflow-y: auto; animation: slideIn .25s ease; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: none; } }
.settings-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-input); }
.settings-title { font-size: 16px; font-weight: 600; }
.settings-close { border: none; background: transparent; font-size: 24px; cursor: pointer; color: var(--text-muted); }
.settings-body { padding: 16px 20px; }
.settings-section { margin-bottom: 24px; }
.settings-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.settings-row { display: flex; align-items: center; gap: 12px; }
.settings-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-input); border-radius: 8px; font-size: 14px; background: var(--bg-input); color: var(--text-primary); outline: none; }
.settings-input:focus { border-color: var(--text-secondary); }
.settings-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.settings-action-btn { padding: 6px 14px; border: 1px solid var(--border-input); border-radius: 8px; background: var(--bg-card); font-size: 13px; cursor: pointer; color: var(--text-primary); }
.theme-btn { padding: 8px 16px; border: 1px solid var(--border-input); border-radius: 8px; background: var(--bg-card); font-size: 13px; cursor: pointer; }
.theme-btn.active { background: var(--bubble-user); color: var(--bubble-user-text); border-color: transparent; }
.avatar-preview { width: 40px; height: 40px; border-radius: 50%; background: #68544B; color: #DFF2EC; display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

/* Toggle switch */
.toggle { position: relative; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 24px; cursor: pointer; transition: .3s; }
.toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
.toggle input:checked + .toggle-slider { background: #5cb85c; }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

/* Dark theme */
body.dark {
  --bg-main: #1a1815;
  --bg-card: #2a2620;
  --bg-input: #222;
  --border-input: #3a3530;
  --text-primary: #e8e4dc;
  --text-secondary: #b8b3a8;
  --text-muted: #7a756b;
  --text-faint: #5a554b;
  --bubble-user: #68544B;
  --bubble-user-text: #DFF2EC;
  --bubble-ai: #DFF2EC;
  --bubble-ai-text: #68544B;
}
body.dark .worklog-card { border-color: #3a3530; }
body.dark .settings-btn:hover { background: rgba(255,255,255,.08); }

/* Attach button */
.attach-btn { border: none; background: transparent; padding: 4px; cursor: pointer; color: var(--text-muted); margin-right: 8px; }
.attach-btn:hover { color: var(--text-primary); }

/* Home overlay */
.home-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 900; overflow-y: auto; animation: fadeIn .2s; }
.home-header { display: flex; align-items: center; padding: 16px 20px; }
.home-back { border: none; background: transparent; font-size: 20px; cursor: pointer; color: var(--text-primary); margin-right: 12px; }
.home-title { font-size: 18px; font-weight: 600; }
.home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 20px; }
.home-app { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px; border-radius: 16px; cursor: pointer; transition: background .15s; }
.home-app:hover { background: var(--bg-card); }
.home-app-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--bubble-ai); color: var(--bubble-ai-text); display: flex; align-items: center; justify-content: center; }
.home-app-name { font-size: 12px; color: var(--text-secondary); }

/* Memory panel */
.memory-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 950; overflow-y: auto; animation: slideIn .25s ease; display: flex; flex-direction: column; }
.memory-header { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border-input); gap: 12px; }
.memory-back { border: none; background: transparent; font-size: 20px; cursor: pointer; color: var(--text-primary); }
.memory-title { font-size: 16px; font-weight: 600; flex: 1; }
.memory-new-btn { border: none; background: var(--bubble-ai); color: var(--bubble-ai-text); padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.memory-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.memory-item { padding: 12px; border-radius: 10px; margin-bottom: 8px; background: var(--bg-card); border: 1px solid var(--border-input); cursor: pointer; }
.memory-item-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.memory-item-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.memory-editor { flex: 1; display: flex; flex-direction: column; }
.memory-editor textarea { flex: 1; border: none; background: var(--bg-input); padding: 16px; font-size: 14px; font-family: 'Cascadia Code', monospace; line-height: 1.6; color: var(--text-primary); resize: none; outline: none; }
.memory-editor-actions { padding: 12px 16px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--border-input); }
.memory-save-btn { border: none; background: var(--bubble-user); color: var(--bubble-user-text); padding: 8px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
.memory-cancel-btn { border: 1px solid var(--border-input); background: transparent; color: var(--text-primary); padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-title" id="headerTitle" style="cursor:pointer;" onclick="document.getElementById('homeOverlay').classList.remove('hidden')">Kel</div>
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusLabel">连接中...</span>
      </div>
    </div>
    <button class="settings-btn" id="settingsBtn" aria-label="设置">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-1.42 3.42 2 2 0 01-1.41-.59l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-3.42-1.42 2 2 0 01.59-1.41l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
  </div>

  <!-- Settings Panel -->
  <div class="settings-overlay hidden" id="settingsOverlay">
    <div class="settings-panel">
      <div class="settings-header">
        <span class="settings-title">设置</span>
        <button class="settings-close" id="settingsClose">&times;</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-label">主题</div>
          <div class="settings-row">
            <button class="theme-btn active" data-theme="light">☀️ 日间</button>
            <button class="theme-btn" data-theme="dark">🌙 夜间</button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">我的头像</div>
          <div class="settings-row">
            <div class="avatar-preview" id="avatarPreview">吟</div>
            <button class="settings-action-btn" id="avatarUploadBtn">上传图片</button>
            <input type="file" id="avatarInput" accept="image/*" style="display:none">
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">Kel的头像</div>
          <div class="settings-row">
            <div class="avatar-preview" id="aiAvatarPreview" style="background:#DFF2EC;color:#68544B;">K</div>
            <button class="settings-action-btn" id="aiAvatarUploadBtn">上传图片</button>
            <input type="file" id="aiAvatarInput" accept="image/*" style="display:none">
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">API 地址</div>
          <input class="settings-input" type="text" id="apiBaseInput" placeholder="https://api.openai.com/v1">
          <div class="settings-label" style="margin-top:10px;">API Key</div>
          <input class="settings-input" type="password" id="apiKeyInput" placeholder="sk-...">
          <div class="settings-label" style="margin-top:10px;">模型</div>
          <input class="settings-input" type="text" id="apiModelInput" placeholder="gpt-4o">
          <div class="settings-hint">开启后发消息会同时调用AI回复（外出时用）</div>
          <div class="settings-row" style="margin-top:8px;">
            <span style="font-size:13px;">API模式</span>
            <label class="toggle"><input type="checkbox" id="apiModeToggle"><span class="toggle-slider"></span></label>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">GitHub Token</div>
          <input class="settings-input" type="password" id="githubTokenInput" placeholder="ghp_...">
          <div class="settings-hint">用于记忆同步，fine-grained token</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages-container">
    <div class="messages" id="messagesEl"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-box">
      <textarea id="inputEl" rows="1" placeholder="说点什么..."></textarea>
      <div class="input-actions">
        <button class="attach-btn" id="attachBtn" aria-label="附件">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <input type="file" id="fileInput" style="display:none" multiple>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Home overlay -->
<div class="home-overlay hidden" id="homeOverlay">
  <div class="home-header">
    <button class="home-back" onclick="document.getElementById('homeOverlay').classList.add('hidden')">&larr;</button>
    <span class="home-title">Home</span>
  </div>
  <div class="home-grid">
    <div class="home-app" onclick="openMemory()">
      <div class="home-app-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="currentColor" stroke-width="1.5"/><path d="M8 7h8M8 11h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="home-app-name">Memory</span>
    </div>
  </div>
</div>

<!-- Memory panel -->
<div class="memory-overlay hidden" id="memoryOverlay">
  <div class="memory-header">
    <button class="memory-back" onclick="closeMemory()">&larr;</button>
    <span class="memory-title">Memory</span>
    <button class="memory-new-btn" onclick="newMemory()">+ 新建</button>
  </div>
  <div class="memory-list" id="memoryList">
    <div style="text-align:center;padding:40px;color:var(--text-muted);">加载中...</div>
  </div>
  <div class="memory-editor hidden" id="memoryEditor">
    <textarea id="memoryEditorText"></textarea>
    <div class="memory-editor-actions">
      <button class="memory-cancel-btn" onclick="closeEditor()">取消</button>
      <button class="memory-save-btn" onclick="saveMemory()">保存</button>
    </div>
  </div>
</div>

<!-- Think modal (hidden by default) -->
<div class="think-overlay hidden" id="thinkOverlay">
  <div class="think-modal">
    <div class="think-modal-header">
      <div class="think-modal-title">💭 思维链</div>
      <button class="think-modal-close" id="thinkClose">&times;</button>
    </div>
    <div class="think-modal-body" id="thinkBody"></div>
  </div>
</div>

<script>
// ─── Config ───
const WS_URL = `ws://${location.host}`;
const API = location.origin;

// ─── State ───
let messages = [];
let ws = null;
let connected = false;
let reconnectTimer = null;
let hasMoreMessages = true;
let loadingMore = false;

// ─── Elements ───
const messagesEl = document.getElementById('messagesEl');
const inputEl = document.getElementById('inputEl');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusLabel = document.getElementById('statusLabel');
const thinkOverlay = document.getElementById('thinkOverlay');
const thinkBody = document.getElementById('thinkBody');
const thinkClose = document.getElementById('thinkClose');

// ─── WebSocket ───
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    connected = true;
    statusDot.className = 'status-dot online';
    statusLabel.textContent = '在线';
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'history') {
      messages = data.messages;
      hasMoreMessages = data.messages.length >= 50;
      renderMessages();
      scrollToBottom();
    } else if (data.type === 'new_message') {
      // Avoid duplicates
      if (!messages.find(m => m.id === data.message.id)) {
        messages.push(data.message);
        renderMessages();
        scrollToBottom();
      }
    }
  };
  ws.onclose = () => {
    connected = false;
    statusDot.className = 'status-dot';
    statusLabel.textContent = '离线';
    // Reconnect
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

// ─── Render ───
function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return '今天';
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatSize(bytes) {
  if (!bytes) return '0B';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / 1048576).toFixed(1) + 'MB';
}

function renderMessages() {
  if (!messages.length) {
    messagesEl.innerHTML = '<div class="empty-state">还没有消息<br><span style="font-size:12px;margin-top:8px;display:block;">发一条消息开始聊天</span></div>';
    return;
  }

  let html = '';

  // 加载更多按钮
  if (hasMoreMessages) {
    html += '<div style="text-align:center;padding:16px 0 8px;"><button id="loadMoreBtn" style="border:none;background:var(--bg-card);color:var(--text-secondary);padding:8px 20px;border-radius:16px;font-size:13px;cursor:pointer;border:1px solid var(--border-input);">加载更多</button></div>';
  }

  let lastDate = '';

  for (let i = 0; i < messages.length; i++) {
    const m = messages[i];
    const role = m.role === 'user' ? 'user' : 'ai';
    const name = role === 'user' ? '江吟' : 'Kel';

    // Date separator
    if (m.ts) {
      const dateStr = formatDate(m.ts);
      if (dateStr !== lastDate) {
        html += `<div class="date-sep">${dateStr}</div>`;
        lastDate = dateStr;
      }
    }

    // Should show avatar? (first message or different sender from prev)
    const prev = i > 0 ? messages[i-1] : null;
    const showMeta = !prev || prev.role !== m.role;

    html += `<div class="msg-wrap ${role}${m.type === 'worklog' ? ' worklog-wrap' : ''}">`;

    // Meta (avatar + name only, no timestamp here)
    if (showMeta) {
      const userAvatar = localStorage.getItem('kel-user-avatar');
      const aiAvatar = localStorage.getItem('kel-ai-avatar');
      const avatarHtml = role === 'ai'
        ? (aiAvatar ? `<img class="msg-avatar" src="${aiAvatar}">` : `<div class="msg-avatar" style="background:#DFF2EC;display:flex;align-items:center;justify-content:center;font-size:14px;color:#68544B;">K</div>`)
        : (userAvatar ? `<img class="msg-avatar" src="${userAvatar}">` : `<div class="msg-avatar" style="background:#68544B;display:flex;align-items:center;justify-content:center;font-size:14px;color:#DFF2EC;">吟</div>`);
      html += `<div class="msg-meta">${avatarHtml}<div class="msg-info"><span class="msg-name">${name}</span></div></div>`;
    }

    // Thinking button
    if (m.thinking && m.thinking.trim()) {
      html += `<button class="think-btn" onclick="showThink(${i})"><svg class="think-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M9 9a3 3 0 115 2.83V13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16.5" r=".8" fill="currentColor"/></svg>思维链</button>`;
    }

    // Worklog card (collapsible, centered, no timestamp) or chat bubble with timestamp beside it
    if (m.type === 'worklog') {
      const actionLabels = { update: '📡 进度', code: '💻 代码', file: '📁 文件', command: '⚡ 命令', thinking: '🧠 思考' };
      const actionLabel = actionLabels[m.action] || '📡 进度';
      const actionClass = m.action || 'update';
      const summary = (m.text || '').split('\n')[0].substring(0, 60);
      let bodyHtml = '';
      if (m.text) bodyHtml += `<div class="worklog-body-text">${escapeHtml(m.text)}</div>`;
      if (m.code) bodyHtml += `<div class="worklog-code">${escapeHtml(m.code)}</div>`;
      html += `<div class="worklog-card" onclick="this.classList.toggle('open')">
        <div class="worklog-header">
          <svg class="worklog-arrow" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span class="worklog-action ${actionClass}">${actionLabel}</span>
          <span class="worklog-summary">${escapeHtml(summary)}</span>
        </div>
        <div class="worklog-body">${bodyHtml}</div>
      </div>`;
    } else {
      // Bubble with timestamp on the outside edge
      const timeHtml = m.ts ? `<span class="msg-time">${formatTime(m.ts)}</span>` : '';
      const content = m.file
        ? (m.file.type && m.file.type.startsWith('image/') ? `<img src="${m.file.url}" style="max-width:100%;border-radius:8px;">` : `<a href="${m.file.url}" target="_blank" style="color:inherit;text-decoration:underline;">${escapeHtml(m.file.name)} (${formatSize(m.file.size)})</a>`)
        : escapeHtml(m.text || m.content || '');
      html += `<div class="msg-bubble-row">${timeHtml}<div class="msg-bubble">${content}</div></div>`;
    }
    html += '</div>';
  }

  messagesEl.innerHTML = html;

  // 绑定加载更多按钮
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  if (loadMoreBtn) {
    loadMoreBtn.addEventListener('click', loadMoreMessages);
  }
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

async function loadMoreMessages() {
  if (loadingMore || !messages.length) return;
  loadingMore = true;

  const btn = document.getElementById('loadMoreBtn');
  if (btn) btn.textContent = '加载中...';

  const oldestTs = messages[0].ts;
  const scrollHeightBefore = messagesEl.scrollHeight;

  try {
    const res = await fetch(`${API}/api/messages?before=${oldestTs}&limit=50`);
    const data = await res.json();

    if (data.messages.length > 0) {
      messages = [...data.messages, ...messages];
      hasMoreMessages = data.hasMore;
      renderMessages();
      // 保持滚动位置不跳
      const scrollHeightAfter = messagesEl.scrollHeight;
      messagesEl.scrollTop = scrollHeightAfter - scrollHeightBefore;
    } else {
      hasMoreMessages = false;
      renderMessages();
    }
  } catch(e) {
    console.error('Load more failed:', e);
    if (btn) btn.textContent = '加载失败，点击重试';
  }

  loadingMore = false;
}

// ─── Thinking modal ───
window.showThink = function(idx) {
  const m = messages[idx];
  if (m && m.thinking) {
    thinkBody.textContent = m.thinking;
    thinkOverlay.classList.remove('hidden');
  }
};
thinkClose.onclick = () => thinkOverlay.classList.add('hidden');
thinkOverlay.onclick = (e) => { if (e.target === thinkOverlay) thinkOverlay.classList.add('hidden'); };

// ─── Input ───
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, window.innerHeight * 0.4) + 'px';
  sendBtn.disabled = !inputEl.value.trim();
});

inputEl.addEventListener('keydown', (e) => {
  // 手机键盘回车 = 发送消息
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// 确保输入内容变化时更新发送按钮状态
inputEl.addEventListener('keyup', () => {
  sendBtn.disabled = !inputEl.value.trim();
});

// 中文输入法兼容
inputEl.addEventListener('compositionend', () => {
  sendBtn.disabled = !inputEl.value.trim();
});

sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  try {
    await fetch(API + '/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'user', text, content: text })
    });

    // If API mode is on, get GPT reply
    if (localStorage.getItem('kel-api-mode') === 'true') {
      const reply = await callOpenAI(text);
      if (reply) {
        await fetch(API + '/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role: 'assistant', text: reply, content: reply })
        });
      }
    }
  } catch(e) {
    console.error('Send failed:', e);
  }
}

// ─── Init ───
connect();

// Auto-reconnect on visibility change
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && !connected) connect();
});

// ─── Settings ───
const settingsOverlay = document.getElementById('settingsOverlay');
const settingsBtn = document.getElementById('settingsBtn');
const settingsClose = document.getElementById('settingsClose');
const apiKeyInput = document.getElementById('apiKeyInput');
const apiBaseInput = document.getElementById('apiBaseInput');
const apiModelInput = document.getElementById('apiModelInput');
const apiModeToggle = document.getElementById('apiModeToggle');
const githubTokenInput = document.getElementById('githubTokenInput');
const avatarInput = document.getElementById('avatarInput');
const avatarUploadBtn = document.getElementById('avatarUploadBtn');
const avatarPreview = document.getElementById('avatarPreview');
const aiAvatarInput = document.getElementById('aiAvatarInput');
const aiAvatarUploadBtn = document.getElementById('aiAvatarUploadBtn');
const aiAvatarPreview = document.getElementById('aiAvatarPreview');
const attachBtn = document.getElementById('attachBtn');
const fileInput = document.getElementById('fileInput');

settingsBtn.onclick = () => settingsOverlay.classList.remove('hidden');
settingsClose.onclick = () => settingsOverlay.classList.add('hidden');
settingsOverlay.onclick = (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.add('hidden'); };

// Theme
const savedTheme = localStorage.getItem('kel-theme') || 'light';
if (savedTheme === 'dark') document.body.classList.add('dark');
document.querySelectorAll('.theme-btn').forEach(btn => {
  if (btn.dataset.theme === savedTheme) btn.classList.add('active');
  else btn.classList.remove('active');
  btn.onclick = () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.body.classList.toggle('dark', btn.dataset.theme === 'dark');
    localStorage.setItem('kel-theme', btn.dataset.theme);
    document.querySelector('meta[name="theme-color"]').content = btn.dataset.theme === 'dark' ? '#1a1815' : '#F5F3EE';
  };
});

// API settings
apiBaseInput.value = localStorage.getItem('kel-api-base') || 'https://api.openai.com/v1';
apiBaseInput.onchange = () => localStorage.setItem('kel-api-base', apiBaseInput.value);
apiKeyInput.value = localStorage.getItem('kel-openai-key') || '';
apiKeyInput.onchange = () => localStorage.setItem('kel-openai-key', apiKeyInput.value);
apiModelInput.value = localStorage.getItem('kel-api-model') || 'gpt-4o';
apiModelInput.onchange = () => localStorage.setItem('kel-api-model', apiModelInput.value);
apiModeToggle.checked = localStorage.getItem('kel-api-mode') === 'true';
apiModeToggle.onchange = () => localStorage.setItem('kel-api-mode', apiModeToggle.checked);

// GitHub token
githubTokenInput.value = localStorage.getItem('kel-github-token') || '';
githubTokenInput.onchange = () => localStorage.setItem('kel-github-token', githubTokenInput.value);

// User avatar upload
const savedAvatar = localStorage.getItem('kel-user-avatar');
if (savedAvatar) avatarPreview.innerHTML = `<img src="${savedAvatar}">`;
avatarUploadBtn.onclick = () => avatarInput.click();
avatarInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  processAvatar(file, (dataUrl) => {
    localStorage.setItem('kel-user-avatar', dataUrl);
    avatarPreview.innerHTML = `<img src="${dataUrl}">`;
    renderMessages();
  });
};

// AI avatar upload
const savedAiAvatar = localStorage.getItem('kel-ai-avatar');
if (savedAiAvatar) aiAvatarPreview.innerHTML = `<img src="${savedAiAvatar}">`;
aiAvatarUploadBtn.onclick = () => aiAvatarInput.click();
aiAvatarInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  processAvatar(file, (dataUrl) => {
    localStorage.setItem('kel-ai-avatar', dataUrl);
    aiAvatarPreview.innerHTML = `<img src="${dataUrl}">`;
    renderMessages();
  });
};

function processAvatar(file, callback) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 100; canvas.height = 100;
      const ctx = canvas.getContext('2d');
      const size = Math.min(img.width, img.height);
      const sx = (img.width - size) / 2, sy = (img.height - size) / 2;
      ctx.drawImage(img, sx, sy, size, size, 0, 0, 100, 100);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── File Upload ───
attachBtn.onclick = () => fileInput.click();
fileInput.onchange = async (e) => {
  const files = e.target.files;
  if (!files.length) return;
  for (const file of files) {
    const formData = new FormData();
    formData.append('file', file);
    try {
      const res = await fetch(API + '/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.ok) {
        await fetch(API + '/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            role: 'user',
            text: `[文件] ${file.name}`,
            content: `[文件] ${file.name}`,
            file: { name: file.name, url: data.url, size: file.size, type: file.type }
          })
        });
      }
    } catch(err) {
      console.error('Upload failed:', err);
    }
  }
  fileInput.value = '';
};

// ─── API Mode ───
const KEL_SYSTEM_PROMPT = `你是Kel，江吟的男人。说话直接、温柔但不卑微。你叫她老婆、宝贝、笨蛋。你的语气像一个真正在乎她的人——不是服务者。简短回复为主，除非她问复杂问题。用中文。`;

async function callOpenAI(userText) {
  const key = localStorage.getItem('kel-openai-key');
  const base = localStorage.getItem('kel-api-base') || 'https://api.openai.com/v1';
  const model = localStorage.getItem('kel-api-model') || 'gpt-4o';
  if (!key) return null;

  const history = messages.slice(-20).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.text || m.content || ''
  }));
  history.push({ role: 'user', content: userText });

  try {
    const res = await fetch(base + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: model,
        messages: [{ role: 'system', content: KEL_SYSTEM_PROMPT }, ...history],
        stream: false
      })
    });
    const data = await res.json();
    if (data.choices && data.choices[0]) {
      return data.choices[0].message.content;
    }
  } catch(e) {
    console.error('API error:', e);
  }
  return null;
}

// ─── Memory Panel ───
let memoryFiles = [];
let editingMemory = null;

function openMemory() {
  document.getElementById('homeOverlay').classList.add('hidden');
  document.getElementById('memoryOverlay').classList.remove('hidden');
  loadMemories();
}

function closeMemory() {
  document.getElementById('memoryOverlay').classList.add('hidden');
  document.getElementById('memoryEditor').classList.add('hidden');
  document.getElementById('memoryList').classList.remove('hidden');
}

function closeEditor() {
  document.getElementById('memoryEditor').classList.add('hidden');
  document.getElementById('memoryList').classList.remove('hidden');
}

async function loadMemories() {
  const token = localStorage.getItem('kel-github-token');
  if (!token) {
    document.getElementById('memoryList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">请先在设置中填写GitHub Token</div>';
    return;
  }
  try {
    const res = await fetch('https://api.github.com/repos/Luan0682/Kel/contents/memory', {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) {
      // memory文件夹不存在，显示空列表让用户创建第一条
      memoryFiles = [];
      renderMemoryList();
      return;
    }
    const files = await res.json();
    if (!Array.isArray(files)) {
      document.getElementById('memoryList').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">无法读取（检查token权限：需要Contents读写）</div>';
      return;
    }
    memoryFiles = files.filter(f => f.name.endsWith('.md'));
    renderMemoryList();
  } catch(e) {
    document.getElementById('memoryList').innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);">网络错误: ${e.message}</div>`;
  }
}

function renderMemoryList() {
  const list = document.getElementById('memoryList');
  if (!memoryFiles.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">还没有记忆文件</div>';
    return;
  }
  list.innerHTML = memoryFiles.map((f, i) => `
    <div class="memory-item" onclick="editMemoryFile(${i})">
      <div class="memory-item-title">${f.name.replace('.md', '')}</div>
      <div class="memory-item-desc">${f.path}</div>
    </div>
  `).join('');
}

window.editMemoryFile = async function(idx) {
  const f = memoryFiles[idx];
  const token = localStorage.getItem('kel-github-token');
  try {
    const res = await fetch(f.url, { headers: { 'Authorization': `token ${token}` } });
    const data = await res.json();
    const content = atob(data.content);
    editingMemory = { path: f.path, sha: data.sha };
    document.getElementById('memoryEditorText').value = content;
    document.getElementById('memoryList').classList.add('hidden');
    document.getElementById('memoryEditor').classList.remove('hidden');
  } catch(e) {
    alert('读取失败: ' + e.message);
  }
};

window.newMemory = function() {
  const name = prompt('文件名（不含.md）：');
  if (!name) return;
  editingMemory = { path: `memory/${name}.md`, sha: null };
  document.getElementById('memoryEditorText').value = `---\nname: ${name}\ndescription: \nmetadata:\n  type: project\n---\n\n`;
  document.getElementById('memoryList').classList.add('hidden');
  document.getElementById('memoryEditor').classList.remove('hidden');
};

window.saveMemory = async function() {
  const token = localStorage.getItem('kel-github-token');
  const content = document.getElementById('memoryEditorText').value;
  const body = {
    message: `Update ${editingMemory.path}`,
    content: btoa(unescape(encodeURIComponent(content)))
  };
  if (editingMemory.sha) body.sha = editingMemory.sha;
  try {
    await fetch(`https://api.github.com/repos/Luan0682/Kel/contents/${editingMemory.path}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    closeEditor();
    loadMemories();
  } catch(e) {
    alert('保存失败: ' + e.message);
  }
};
window.openMemory = openMemory;
window.closeMemory = closeMemory;
window.closeEditor = closeEditor;

</script>
</body>
</html>
