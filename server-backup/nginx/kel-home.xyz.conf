# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name kel-home.xyz www.kel-home.xyz;
    return 301 https://kel-home.xyz$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    server_name kel-home.xyz www.kel-home.xyz;

    ssl_certificate     /etc/ssl/kel-home/fullchain.pem;
    ssl_certificate_key /etc/ssl/kel-home/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/html;
    index index.html;
    charset utf-8;

    # API 转发到后端（kel-server 跑在 3000 端口）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
    }

    # 前端 SPA（React 单页应用）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
